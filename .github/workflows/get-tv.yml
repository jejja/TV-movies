name: Hämta TV-tablå

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Kolla ut koden
        uses: actions/checkout@v4

      - name: Skapa datamapp och ladda ner XML
        run: |
          DATE=$(date +%Y-%m-%d)
          mkdir -p data
          
          URL="http://xmltv.tv.swedb.se"
          
          # Vi låtsas vara Chrome på Windows och hävdar att vi kom från deras egen startsida
          AGENT="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36"
          REFERER="http://xmltv.tv.swedb.se/"
          
          echo "Börjar ladda ner filerna för $DATE..."
          
          curl -A "$AGENT" -e "$REFERER" -f -s -L -o data/svt1.xml "$URL/svt1.svt.se_$DATE.xml" || echo "SVT1 misslyckades"
          curl -A "$AGENT" -e "$REFERER" -f -s -L -o data/svt2.xml "$URL/svt2.svt.se_$DATE.xml" || echo "SVT2 misslyckades"
          curl -A "$AGENT" -e "$REFERER" -f -s -L -o data/tv3.xml "$URL/tv3.se_$DATE.xml" || echo "TV3 misslyckades"
          curl -A "$AGENT" -e "$REFERER" -f -s -L -o data/tv4.xml "$URL/tv4.se_$DATE.xml" || echo "TV4 misslyckades"
          curl -A "$AGENT" -e "$REFERER" -f -s -L -o data/kanal5.xml "$URL/kanal5.se_$DATE.xml" || echo "Kanal 5 misslyckades"
          
          echo "Nedladdning klar! Kollar om några filer sparades..."
          ls -la data/

      - name: Spara filerna i repot
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "Uppdaterat TV-tablå" || exit 0
          git push
