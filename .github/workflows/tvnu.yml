name: Hämta Tv.nu Tablå

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Kolla ut koden
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Ladda ner data via Proxys
        run: |
          DATE=$(date +%Y-%m-%d)
          mkdir -p data
          
          AGENT="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/123.0.0.0 Safari/537.36"
          CHANNELS=("svt1" "svt2" "tv3" "tv4" "kanal-5" "tv6" "sjuan" "tv8" "kanal-9" "tv10" "kanal-11" "tv12" "v-sport-1" "kunskapskanalen" "svt-barn")
          
          for CH in "${CHANNELS[@]}"; do
            echo "====== Hämtar $CH ======"
            
            # Här är magin! Vi lägger till ett slumptal i slutet så proxyn tvingas hämta en helt ny fil
            TARGET_URL="https://web-api.tv.nu/channels/${CH}/schedule?date=$DATE&fullDay=true&cb=$RANDOM"
            ENCODED_URL=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$TARGET_URL', safe=''))")
            SUCCESS=false
            
            # FÖRSÖK 1: Corsproxy
            curl -A "$AGENT" -s -L -o "data/${CH}.json" "https://corsproxy.io/?${ENCODED_URL}"
            if grep -q '"broadcasts"' "data/${CH}.json" 2>/dev/null; then
              echo "Lyckades via Corsproxy!"
              SUCCESS=true
            else
              echo "Corsproxy blockade/cachade. Byter till AllOrigins..."
              
              # FÖRSÖK 2: AllOrigins
              curl -s -L -o "data/${CH}.json" "https://api.allorigins.win/raw?url=${ENCODED_URL}"
              if grep -q '"broadcasts"' "data/${CH}.json" 2>/dev/null; then
                echo "Lyckades via AllOrigins!"
                SUCCESS=true
              else
                echo "AllOrigins blockade/cachade. Byter till CodeTabs..."
                
                # FÖRSÖK 3: CodeTabs
                curl -A "$AGENT" -s -L -o "data/${CH}.json" "https://api.codetabs.com/v1/proxy/?quest=${TARGET_URL}"
                if grep -q '"broadcasts"' "data/${CH}.json" 2>/dev/null; then
                  echo "Lyckades via CodeTabs!"
                  SUCCESS=true
                fi
              fi
            fi
            
            if [ "$SUCCESS" = false ]; then
              echo "Misslyckades helt för $CH. Tar bort tom/trasig fil."
              rm -f "data/${CH}.json"
            fi
            
            # LÅNG PAUS: Låter alla servrar andas ut så spärren nollställs
            echo "Väntar 35 sekunder..."
            sleep 35
          done

      - name: Spara filer till GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "Automatisk uppdatering av TV-filmer via cachebust-proxy" || true
          git pull origin main --rebase
          git push origin HEAD:main
