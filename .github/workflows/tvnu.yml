name: Hämta Tv.nu Tablå

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Kolla ut koden
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Ladda ner data via Proxys
        run: |
          DATE=$(date +%Y-%m-%d)
          mkdir -p data
          
          AGENT="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/123.0.0.0 Safari/537.36"
          CHANNELS=("svt1" "svt2" "tv3" "tv4" "kanal-5" "tv6" "sjuan" "tv8" "kanal-9" "tv10" "kanal-11" "tv12" "v-sport-1" "kunskapskanalen" "svt-barn")
          
          for CH in "${CHANNELS[@]}"; do
            echo "====== Hämtar $CH ======"
            
            # API-länken vi egentligen vill nå
            TARGET_URL="https://web-api.tv.nu/channels/${CH}/schedule?date=$DATE&fullDay=true"
            
            # Gör om länken så den är säker att skicka in i en proxy (URL Encoding)
            ENCODED_URL=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$TARGET_URL', safe=''))")
            
            # FÖRSÖK 1: Använd AllOrigins som sköld
            curl -s -L -o "data/${CH}.json" "https://api.allorigins.win/raw?url=${ENCODED_URL}"
            
            # Kolla om filen innehåller ordet 'broadcasts' (då vet vi att det är en äkta tv-tablå)
            if ! grep -q '"broadcasts"' "data/${CH}.json" 2>/dev/null; then
              echo "Blockerad av Cloudflare. Byter till reserv-proxy (corsproxy.io)..."
              
              # FÖRSÖK 2: Om AllOrigins misslyckas, kör Corsproxy
              curl -A "$AGENT" -s -L -o "data/${CH}.json" "https://corsproxy.io/?${ENCODED_URL}"
              
              if ! grep -q '"broadcasts"' "data/${CH}.json" 2>/dev/null; then
                echo "Misslyckades helt. Båda proxyservrarna blockade. Tar bort tom fil."
                rm -f "data/${CH}.json"
              else
                echo "Lyckades via Corsproxy!"
              fi
            else
              echo "Lyckades via AllOrigins!"
            fi
            
            # Vi väntar 5 sekunder innan vi skickar proxyn på nästa kanal
            sleep 5
          done

      - name: Spara filer till GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "Automatisk uppdatering av TV-filmer via proxy" || true
          git pull origin main --rebase
          git push origin HEAD:main
