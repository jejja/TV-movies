<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dagens Filmer på TV</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .channel { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .channel h2 { margin-top: 0; color: #1e88e5; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .program { padding: 12px 0; border-bottom: 1px solid #eee; display: flex; }
        .program:last-child { border-bottom: none; }
        .time { font-weight: bold; width: 60px; flex-shrink: 0; color: #555; }
        .title-container { flex-grow: 1; }
        .title { font-weight: bold; font-size: 1.1em; }
        .description { display: block; font-size: 0.9em; color: #666; margin-top: 6px; line-height: 1.4; }
        .error { color: #888; font-style: italic; }
        
        .imdb { 
            display: inline-block; 
            background: #f3ce13; 
            color: #000; 
            font-weight: bold; 
            font-size: 0.8em; 
            padding: 2px 6px; 
            border-radius: 4px; 
            text-decoration: none; 
            margin-left: 8px;
            vertical-align: text-bottom;
        }
        .imdb:hover { background: #e0b000; }

        .loading-container { color: #666; font-style: italic; display: flex; align-items: center; }
        .spinner {
            border: 3px solid #f3f3f3; 
            border-top: 3px solid #1e88e5; 
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Dagens Filmer på TV</h1>
        <div id="guide"></div>
    </div>

    <script>
        const channels = [
            { slug: 'svt1', name: 'SVT 1' },
            { slug: 'svt2', name: 'SVT 2' },
            { slug: 'tv3', name: 'TV3' },
            { slug: 'tv4', name: 'TV4' },
            { slug: 'kanal-5', name: 'Kanal 5' },
            { slug: 'tv6', name: 'TV6' },
            { slug: 'sjuan', name: 'Sjuan' },
            { slug: 'tv8', name: 'TV8' },
            { slug: 'kanal-9', name: 'Kanal 9' },
            { slug: 'tv10', name: 'TV10' },
            { slug: 'kanal-11', name: 'Kanal 11' },
            { slug: 'tv12', name: 'TV12' },
            { slug: 'v-sport-1', name: 'V Sport 1' },
            { slug: 'kunskapskanalen', name: 'Kunskapskanalen' },
            { slug: 'svt-barn', name: 'SVT Barn' }
        ];

        const guideDiv = document.getElementById('guide');

        async function fetchChannel(channel, channelDiv) {
            // Nu hämtar vi datan från vår EGEN mapp i GitHub!
            const targetUrl = `data/${channel.slug}.json`;

            try {
                // Vi lägger till en liten cache-buster bara så du alltid får senaste filen när du laddar om
                const response = await fetch(targetUrl + `?cb=${new Date().getTime()}`);
                
                if (!response.ok) throw new Error(`Filen hittades inte (Är GitHub Action körd?)`);
                
                const jsonData = await response.json();
                const broadcasts = (jsonData.data && jsonData.data.broadcasts) ? jsonData.data.broadcasts : [];
                
                const movies = broadcasts.filter(prog => prog.isMovie === true);
                
                let html = `<h2>${channel.name}</h2>`;
                
                if (movies.length === 0) {
                    html += `<p class="error">Inga filmer visas på denna kanal idag.</p>`;
                } else {
                    movies.forEach(prog => {
                        if (prog.broadcast && prog.broadcast.startTime) {
                            const dateObj = new Date(prog.broadcast.startTime);
                            const timeStr = dateObj.toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit' });
                            
                            const yearStr = prog.year ? ` (${prog.year})` : '';
                            const descStr = prog.description ? `<span class="description">${prog.description}</span>` : '';
                            
                            let imdbBadge = '';
                            if (prog.imdb && prog.imdb.rating) {
                                imdbBadge = `<a href="${prog.imdb.link}" target="_blank" class="imdb" title="Läs mer på IMDb">⭐ ${prog.imdb.rating}</a>`;
                            }
                            
                            html += `
                                <div class="program">
                                    <span class="time">${timeStr}</span>
                                    <div class="title-container">
                                        <span class="title">${prog.title || 'Okänd film'}${yearStr}</span>
                                        ${imdbBadge}
                                        ${descStr}
                                    </div>
                                </div>
                            `;
                        }
                    });
                }
                
                channelDiv.innerHTML = html;

            } catch (error) {
                channelDiv.innerHTML = `<h2>${channel.name}</h2><p class="error">${error.message}</p>`;
            }
        }

        async function loadAllChannels() {
            // Skapa alla rutorna direkt...
            channels.forEach(channel => {
                const div = document.createElement('div');
                div.className = 'channel';
                div.innerHTML = `<h2>${channel.name}</h2>
                                 <div class="loading-container">
                                    <div class="spinner"></div> Hämtar filmer...
                                 </div>`;
                guideDiv.appendChild(div);
                
                // Och ladda in alla SAMTIDIGT! Vi behöver inte stå i kö längre.
                fetchChannel(channel, div);
            });
        }

        loadAllChannels();
    </script>
</body>
</html>
