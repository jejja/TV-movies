<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Filmguiden">
    <meta name="theme-color" content="#0f0f0f">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍿</text></svg>">
    <title>Filmguiden 🍿</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header-wrapper">
    <div class="tabs">
        <button id="tab-today" class="tab active" onclick="switchTab('today')">IDAG</button>
        <button id="tab-history" class="tab" onclick="switchTab('history')">
            ARKIV
            <small>Senaste 7 dagarna</small>
        </button>
    </div>
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
</div>

<div class="search-container" id="searchContainer" style="display: none;">
    <div class="search-wrapper">
        <input type="text" id="tvSearchInput" class="search-input" placeholder="🔍 Sök på titel, skådespelare, regissör, genre..." oninput="toggleClearBtn('tvSearchInput', 'tvClearBtn'); render()">
        <button id="tvClearBtn" class="clear-btn" onclick="clearSearch('tvSearchInput', 'tvClearBtn')">✕</button>
    </div>
</div>

<div class="tools-container" style="padding: 16px 16px 10px 16px;">
    <div class="year-slider-container">
        <span>⏳ Max tid:</span>
        <input type="range" id="tvDurationSlider" class="year-slider" min="60" max="240" step="5" value="240" oninput="updateDurationDisplay(this.value, 'tvDurationDisplay')" onchange="render()">
        <span id="tvDurationDisplay" class="year-display" style="min-width: 45px;">Alla</span>
    </div>
</div>

<div id="menuOverlay" class="menu-overlay" onclick="toggleMenu()"></div>
<div id="sideMenu" class="side-menu">
    <button class="menu-close" onclick="toggleMenu()">✕</button>
    <div class="menu-links">
        <a href="index.html" class="active">TV-tablå <span>📺</span></a>
        <a href="svtplay.html">SVT Play <span>▶️</span></a>
    </div>
</div>

<div id="movie-grid"></div>

<div class="footer">
    Designad för filmälskare. <br>
    Data: <a href="https://www.themoviedb.org/" target="_blank">TMDB</a> & <a href="https://www.omdbapi.com/" target="_blank">OMDb</a>
</div>

<div id="movieModal" class="modal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-btn" onclick="closeModal(event)">×</span>
        <img id="modalPoster" class="modal-hero-img">
        <div id="modalPosterPlaceholder" class="modal-hero-placeholder">⭐</div>
        <div class="modal-body">
            <div id="modalGenre" class="modal-genre"></div>
            <div class="modal-title-wrap">
                <h2 id="modalTitle" style="margin: 0; letter-spacing: -0.03em;"></h2>
                <span id="modalRating" class="modal-rating"></span>
            </div>
            <div class="extra-ratings" id="modalExtraRatings">
                <div class="rating-item" id="rtWrap">
                    <span class="rt-icon">🍅</span> <span id="modalRotten"></span>
                </div>
                <div class="rating-item" id="mcWrap">
                    <span id="modalMetaIcon" class="mc-icon">M</span> <span id="modalMetacritic"></span>
                </div>
            </div>
            <div id="modalMeta" class="meta" style="margin-top: 10px;"></div>
            <div id="modalCast" style="font-size: 13px; color: #9ca3af; margin-top: 12px; line-height: 1.4;"></div>
            <p id="modalDesc" class="modal-desc"></p>
            <a id="modalImdb" target="_blank" style="background: var(--imdb); color: black; padding: 12px 24px; border-radius: 10px; text-decoration: none; font-weight: 800; font-size: 14px; display: inline-block;">Öppna IMDb</a>
        </div>
    </div>
</div>

<script src="app.js"></script>

<script>
    let currentTab = 'today';
    let allMoviesData = [];

    // LOKALA kanalloggor
    const channelLogos = {
        "SVT1": "logos/svt1.svg",
        "SVT2": "logos/svt2.svg",
        "TV3": "logos/tv3.svg"
    };

    function fallbackLogo(imgElement, chName) {
        imgElement.outerHTML = `<h2 class="section-title" style="margin:0;">${chName}</h2>`;
    }

    // NYTT: Funktion som bygger om minuter till "1:20"
    function updateDurationDisplay(val, displayId) {
        if (val >= 240) {
            document.getElementById(displayId).innerText = "Alla";
            return;
        }
        const h = Math.floor(val / 60);
        const m = val % 60;
        const mStr = m < 10 ? "0" + m : m; // Lägger till nolla, tex 1:05
        document.getElementById(displayId).innerText = `${h}:${mStr}`;
    }

    async function init() {
        try {
            const res = await fetch('movies.json?cb=' + Date.now());
            if (res.ok) allMoviesData = await res.json();
            render();
        } catch (e) { console.error(e); }
    }

    function createCardHTML(m) {
        const dateObj = new Date(m.startTime);
        const timeStr = dateObj.toLocaleTimeString('sv-SE', {hour: '2-digit', minute:'2-digit'});
        const dateStr = dateObj.toLocaleDateString('sv-SE', {day: 'numeric', month: 'short'});
        const durationStr = getDurationText(m);
        const metaHTML = currentTab === 'today' ? `Idag ${timeStr} • ${durationStr}` : `${dateStr} • ${m.channel} • ${durationStr}`;
        const posterHTML = m.image ? `<img class="poster" src="${m.image}" loading="lazy" onerror="this.parentElement.innerHTML='<span class=\'poster-placeholder\'>⭐</span>'">` : `<span class="poster-placeholder">⭐</span>`;
        const safeTitle = m.title.replace(/'/g, "\\'").replace(/"/g, '&quot;');

        return `
            <div class="movie-card" onclick="openModalById('${m.startTime}-${safeTitle}')">
                <div class="poster-container">
                    ${(m.imdbRate && m.imdbRate !== "N/A") ? `<div class="imdb-badge">★ ${m.imdbRate}</div>` : ''}
                    ${posterHTML}
                </div>
                <div class="info">
                    <div class="title">${m.title}</div>
                    <div class="meta">${metaHTML}</div>
                </div>
            </div>
        `;
    }

    function render() {
        const root = document.getElementById('movie-grid');
        root.innerHTML = "";

        const searchInput = document.getElementById('tvSearchInput');
        const searchTerm = searchInput ? searchInput.value.toLowerCase() : "";
        const maxDuration = parseInt(document.getElementById('tvDurationSlider').value) || 240;

        const now = new Date();
        const logicalDay = new Date(now.getTime() - 5 * 60 * 60 * 1000);
        logicalDay.setHours(5, 0, 0, 0);
        const startOfTodayMs = logicalDay.getTime();

        let moviesToDisplay = (currentTab === 'today')
            ? allMoviesData.filter(m => m.startTime >= startOfTodayMs)
            : allMoviesData.filter(m => m.startTime < startOfTodayMs);

        // Filtrera på Tidslängd
        if (maxDuration < 240) {
            moviesToDisplay = moviesToDisplay.filter(m => {
                let runtime = 999; // Om vi inte har en tid, sätt högt så den döljs vid filter
                if (m.runtime && m.runtime > 0) {
                    runtime = m.runtime;
                } else if (m.startTime && m.endTime) {
                    runtime = Math.floor((m.endTime - m.startTime) / 60000);
                }
                return runtime <= maxDuration;
            });
        }

        // Filtrera på Sökord
        if (searchTerm !== "") {
            moviesToDisplay = moviesToDisplay.filter(m => {
                const titleMatch = m.title && m.title.toLowerCase().includes(searchTerm);
                const actorMatch = m.actors && m.actors.toLowerCase().includes(searchTerm);
                const dirMatch = m.director && m.director.toLowerCase().includes(searchTerm);
                const genreMatch = m.genres && m.genres.toLowerCase().includes(searchTerm);
                const catMatch = m.originalCategory && m.originalCategory.toLowerCase().includes(searchTerm);
                return titleMatch || actorMatch || dirMatch || genreMatch || catMatch;
            });
        }

        const topMovies = moviesToDisplay.filter(m => parseFloat(m.imdbRate) >= 7.0);
        if (topMovies.length > 0) {
            topMovies.sort((a, b) => parseFloat(b.imdbRate) - parseFloat(a.imdbRate));
            const topSection = document.createElement('div');
            topSection.innerHTML = `
                <h2 class="section-title">⭐ Bäst på IMDb (7.0+)</h2>
                <div class="container" style="padding-top:0;">${topMovies.map(m => createCardHTML(m)).join('')}</div>
            `;
            root.appendChild(topSection);
        }

        const kanaler = ["SVT1", "SVT2", "TV3", "TV4", "KANAL 5", "TV6", "SJUAN", "TV8", "KANAL 9", "TV10", "KANAL 11", "TV12"];
        kanaler.forEach(ch => {
            const chMovies = moviesToDisplay.filter(m => m.channel === ch);
            if (currentTab === 'history') chMovies.sort((a, b) => b.startTime - a.startTime);
            else chMovies.sort((a, b) => a.startTime - b.startTime);

            if (chMovies.length > 0 || (searchTerm === "" && maxDuration === 240)) {
                const chSection = document.createElement('div');
                const logoUrl = channelLogos[ch];

                const fallbackText = `<h2 class="section-title" style="margin:0;">${ch}</h2>`;
                const headerHtml = logoUrl
                    ? `<img src="${logoUrl}" alt="${ch}" class="tv-pic" style="filter: drop-shadow(0px 0px 4px rgba(255,255,255,0.5));" onerror="fallbackLogo(this, '${ch}')">`
                    : fallbackText;

                chSection.innerHTML = `
                    <div class="channel-header">${headerHtml}</div>
                    <div class="container" style="padding-top:0;">
                        ${chMovies.length > 0 ? chMovies.map(m => createCardHTML(m)).join('') : '<div class="empty-channel">Inga filmer matchar filterna</div>'}
                    </div>
                `;
                root.appendChild(chSection);
            }
        });
    }

    function switchTab(tab) {
        currentTab = tab;
        document.getElementById('tab-today').classList.toggle('active', tab === 'today');
        document.getElementById('tab-history').classList.toggle('active', tab === 'history');

        const searchContainer = document.getElementById('searchContainer');
        const searchInput = document.getElementById('tvSearchInput');

        if (tab === 'history') {
            searchContainer.style.display = 'block';
        } else {
            searchContainer.style.display = 'none';
            if (searchInput) {
                searchInput.value = '';
                toggleClearBtn('tvSearchInput', 'tvClearBtn');
            }
        }

        render();
    }

    function openModalById(idMatch) {
        const [startTime, ...titleParts] = idMatch.split('-');
        const title = titleParts.join('-');
        const m = allMoviesData.find(x => x.startTime.toString() === startTime && x.title === title);
        if(m) openSharedModal(m, 'tv');
    }

    init();
</script>
</body>
</html>
