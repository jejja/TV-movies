<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dagens Filmer pĂĄ TV</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .channel { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .channel h2 { margin-top: 0; color: #1e88e5; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .program { padding: 8px 0; border-bottom: 1px solid #eee; display: flex; }
        .program:last-child { border-bottom: none; }
        .time { font-weight: bold; width: 60px; flex-shrink: 0; color: #555; }
        .title { flex-grow: 1; font-weight: bold; }
        .description { display: block; font-size: 0.9em; color: #666; margin-top: 4px; font-weight: normal; }
        .loading { font-style: italic; color: #666; }
        .error { color: #888; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Dagens Filmer pĂĄ TV</h1>
        <div id="guide"></div>
    </div>

    <script>
        // Alla Ă¶nskade kanaler med korrekta id:n (slugs) fĂ¶r Tv.nu
        const channels = [
            { slug: 'svt1', name: 'SVT 1' },
            { slug: 'svt2', name: 'SVT 2' },
            { slug: 'tv3', name: 'TV3' },
            { slug: 'tv4', name: 'TV4' },
            { slug: 'kanal-5', name: 'Kanal 5' },
            { slug: 'tv6', name: 'TV6' },
            { slug: 'sjuan', name: 'Sjuan' },
            { slug: 'tv8', name: 'TV8' },
            { slug: 'kanal-9', name: 'Kanal 9' },
            { slug: 'tv10', name: 'TV10' },
            { slug: 'kanal-11', name: 'Kanal 11' },
            { slug: 'tv12', name: 'TV12' },
            { slug: 'v-sport-1', name: 'V Sport 1' },
            { slug: 'kunskapskanalen', name: 'Kunskapskanalen' },
            { slug: 'svt-barn', name: 'SVT Barn' }
        ];

        // Dagens datum (Ă…Ă…Ă…Ă…-MM-DD)
        const today = new Date();
        const dateStr = today.getFullYear() + '-' + 
                        String(today.getMonth() + 1).padStart(2, '0') + '-' + 
                        String(today.getDate()).padStart(2, '0');

        const guideDiv = document.getElementById('guide');

        async function fetchChannel(channel) {
            const channelDiv = document.createElement('div');
            channelDiv.className = 'channel';
            channelDiv.innerHTML = `<h2>${channel.name}</h2><div class="loading">HĂ¤mtar filmer...</div>`;
            guideDiv.appendChild(channelDiv);

            const targetUrl = `https://web-api.tv.nu/channels/${channel.slug}/schedule?date=${dateStr}&fullDay=true`;
            const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;

            try {
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error("Kunde inte hĂ¤mta data.");
                
                const jsonData = await response.json();
                const broadcasts = (jsonData.data && jsonData.data.broadcasts) ? jsonData.data.broadcasts : [];
                
                // Filtrera ut ENDAST filmer!
                const movies = broadcasts.filter(prog => prog.isMovie === true);
                
                let html = `<h2>${channel.name}</h2>`;
                
                if (movies.length === 0) {
                    html += `<p class="error">Inga filmer visas pĂĄ denna kanal idag.</p>`;
                } else {
                    movies.forEach(prog => {
                        if (prog.broadcast && prog.broadcast.startTime) {
                            const dateObj = new Date(prog.broadcast.startTime);
                            const timeStr = dateObj.toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit' });
                            
                            // Jag lade till en rad fĂ¶r att visa beskrivningen och ĂĄrtalet ocksĂĄ, eftersom det Ă¤r trevligt fĂ¶r just filmer!
                            const yearStr = prog.year ? ` (${prog.year})` : '';
                            const descStr = prog.description ? `<span class="description">${prog.description}</span>` : '';
                            
                            html += `
                                <div class="program">
                                    <span class="time">${timeStr}</span>
                                    <span class="title">${prog.title || 'OkĂ¤nd film'} ${yearStr}
                                        ${descStr}
                                    </span>
                                </div>
                            `;
                        }
                    });
                }
                
                channelDiv.innerHTML = html;

            } catch (error) {
                channelDiv.innerHTML = `<h2>${channel.name}</h2><p class="error">Gick inte att ansluta: ${error.message}</p>`;
            }
        }

        channels.forEach(fetchChannel);
    </script>
</body>
</html>
