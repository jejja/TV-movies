<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dagens TV-tablå (Tv.nu)</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .channel { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .channel h2 { margin-top: 0; color: #1e88e5; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .program { padding: 8px 0; border-bottom: 1px solid #eee; display: flex; }
        .program:last-child { border-bottom: none; }
        .time { font-weight: bold; width: 60px; flex-shrink: 0; color: #555; }
        .title { flex-grow: 1; }
        .loading { font-style: italic; color: #666; }
        .error { color: #d32f2f; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Svensk TV-tablå (Idag)</h1>
        <div id="guide"></div>
    </div>

    <script>
        // Kanal-id:n (slugs) exakt så som tv.nu namnger dem i sitt system
        const channels = [
            { slug: 'svt1', name: 'SVT 1' },
            { slug: 'svt2', name: 'SVT 2' },
            { slug: 'tv3', name: 'TV3' },
            { slug: 'tv4', name: 'TV4' },
            { slug: 'kanal-5', name: 'Kanal 5' }
        ];

        // Dagens datum (ÅÅÅÅ-MM-DD)
        const today = new Date();
        const dateStr = today.getFullYear() + '-' + 
                        String(today.getMonth() + 1).padStart(2, '0') + '-' + 
                        String(today.getDate()).padStart(2, '0');

        const guideDiv = document.getElementById('guide');

        // Smart funktion: Leta upp "broadcasts"-arrayen oavsett var i JSON-trädet Tv.nu gömmer den
        function findBroadcasts(obj) {
            if (obj && obj.broadcasts && Array.isArray(obj.broadcasts)) return obj.broadcasts;
            for (let key in obj) {
                if (typeof obj[key] === 'object' && obj[key] !== null) {
                    let result = findBroadcasts(obj[key]);
                    if (result.length > 0) return result;
                }
            }
            return [];
        }

        async function fetchChannel(channel) {
            const channelDiv = document.createElement('div');
            channelDiv.className = 'channel';
            channelDiv.innerHTML = `<h2>${channel.name}</h2><div class="loading">Hämtar tablå från Tv.nu...</div>`;
            guideDiv.appendChild(channelDiv);

            // Mål-API hos Tv.nu
            const targetUrl = `https://web-api.tv.nu/channels/${channel.slug}/schedule?date=${dateStr}&fullDay=true`;
            
            // Proxy för att lura webbläsarens inbyggda spärrar (CORS)
            const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;

            try {
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error("Kunde inte hämta data. (Blockerad av proxy/tv.nu)");
                
                const jsonData = await response.json();
                
                // Använd vår smarta sökfunktion för att hitta listan på program
                const broadcasts = findBroadcasts(jsonData);
                
                let html = `<h2>${channel.name}</h2>`;
                
                if (broadcasts.length === 0) {
                    html += `<p class="error">Ingen tablå hittades just nu.</p>`;
                } else {
                    broadcasts.forEach(prog => {
                        // Tv.nu svarar med en "Timestamp" (millisekunder eller sekunder), vi gör om det till klockslag!
                        let dateObj;
                        if (prog.startTime.toString().length === 10) {
                            dateObj = new Date(prog.startTime * 1000); // Om sekunder
                        } else {
                            dateObj = new Date(prog.startTime); // Om millisekunder
                        }
                        
                        const timeStr = dateObj.toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit' });
                        
                        html += `
                            <div class="program">
                                <span class="time">${timeStr}</span>
                                <span class="title">${prog.title || 'Okänt program'}</span>
                            </div>
                        `;
                    });
                }
                
                channelDiv.innerHTML = html;

            } catch (error) {
                channelDiv.innerHTML = `<h2>${channel.name}</h2><p class="error">Gick inte att ansluta: ${error.message}</p>`;
            }
        }

        // Ladda alla kanaler
        channels.forEach(fetchChannel);
    </script>
</body>
</html>
