<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Filmguiden">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f0f0f">
    
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍿</text></svg>">
    
    <title>Filmguiden 🍿</title>
    <link rel="manifest" href="manifest.json">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        :root { 
            --bg: #0f0f0f; 
            --card: #1a1a1a; 
            --text: #ffffff; 
            --accent: #e50914; 
            --gray: #9ca3af; 
            --imdb: #f5c518;
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            -webkit-font-smoothing: antialiased;
            padding-bottom: env(safe-area-inset-bottom, 40px); /* Respekterar iPhones hem-indikator */
            padding-top: env(safe-area-inset-top, 0px);
        }

        .tabs { 
            display: flex; 
            position: sticky; 
            top: 0; 
            background: rgba(15, 15, 15, 0.95); 
            backdrop-filter: blur(10px);
            z-index: 100; 
            padding: calc(12px + env(safe-area-inset-top, 0px)) 12px 12px 12px; 
            gap: 12px; 
            border-bottom: 1px solid #262626; 
        }
        .tab { 
            flex: 1; 
            padding: 10px; 
            border: none; 
            background: #262626; 
            color: var(--gray); 
            border-radius: 10px; 
            font-weight: 600; 
            font-size: 14px;
            cursor: pointer; 
        }
        .tab.active { background: var(--accent); color: white; box-shadow: 0 4px 12px rgba(229, 9, 20, 0.3); }

        .section-title { 
            font-weight: 800;
            font-size: 18px; 
            margin: 30px 16px 12px 16px; 
            color: white;
            letter-spacing: -0.02em;
        }

        .container { 
            padding: 0 16px 20px 16px; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 16px; 
        }

        .movie-card { 
            background: var(--card); 
            border-radius: 12px; 
            overflow: hidden; 
            transition: transform 0.2s cubic-bezier(0.2, 0, 0.2, 1); 
            cursor: pointer; 
            position: relative; 
            border: 1px solid #262626;
        }
        .movie-card:active { transform: scale(0.96); }

        .poster-container {
            width: 100%;
            aspect-ratio: 2/3;
            position: relative;
            background: #262626;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .poster { width: 100%; height: 100%; object-fit: cover; }
        .poster-placeholder { font-size: 40px; filter: drop-shadow(0 0 10px rgba(245, 197, 24, 0.4)); }

        .imdb-badge { 
            position: absolute; 
            top: 8px; right: 8px; 
            background: var(--imdb); 
            color: black; 
            padding: 3px 6px; 
            border-radius: 6px; 
            font-size: 11px; 
            font-weight: 800; 
            z-index: 2; 
        }

        .info { padding: 12px; }
        .title { 
            font-size: 14px; 
            font-weight: 600; 
            margin-bottom: 4px; 
            line-height: 1.3;
            display: -webkit-box; 
            -webkit-line-clamp: 2; 
            -webkit-box-orient: vertical; 
            overflow: hidden; 
        }
        .meta { font-size: 12px; color: var(--gray); }

        /* Modal */
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); 
            z-index: 1000; 
            justify-content: center; 
            align-items: center; 
            padding: 16px; 
            backdrop-filter: blur(5px);
        }
        .modal-content { 
            background: var(--card); 
            width: 100%; 
            max-width: 450px; 
            border-radius: 20px; 
            position: relative; 
            max-height: 85vh; 
            overflow-y: auto; 
            border: 1px solid #333;
        }
        
        /* Netflix-style Bild-Fade i Modalen */
        .modal-hero-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            object-position: center 25%; /* Fokuserar lite över mitten */
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            display: block;
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 50%, rgba(0,0,0,0) 100%);
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 50%, rgba(0,0,0,0) 100%);
        }

        .modal-body { 
            padding: 0 24px 24px 24px; 
            position: relative;
            margin-top: -30px; /* Drar upp texten över faden */
        }
        
        .close-btn { 
            position: absolute; 
            top: 15px; right: 15px; 
            font-size: 28px; color: white; 
            cursor: pointer; z-index: 10; 
            background: rgba(0,0,0,0.6);
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .modal-genre { color: var(--accent); font-weight: 600; font-size: 12px; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.05em; }
        .modal-title-wrap { display: flex; align-items: baseline; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
        .modal-rating { color: var(--imdb); font-weight: 800; font-size: 20px; }
        .modal-desc { color: #d1d5db; line-height: 1.6; font-size: 15px; margin: 18px 0; }

        .footer { text-align: center; padding: 40px 20px; color: var(--gray); font-size: 11px; }
        .footer a { color: white; text-decoration: none; font-weight: 600; }

        .empty-channel { grid-column: 1 / -1; padding: 30px; background: rgba(255,255,255,0.02); border: 1px dashed #333; border-radius: 12px; text-align: center; color: var(--gray); font-size: 13px; }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab active" onclick="switchTab('today')">IDAG</button>
        <button class="tab" onclick="switchTab('history')">ARKIV</button>
    </div>

    <div id="movie-grid"></div>

    <div class="footer">
        Designad för filmälskare. <br>
        Data: <a href="https://www.themoviedb.org/" target="_blank">TMDB</a> & <a href="https://www.omdbapi.com/" target="_blank">OMDb</a>
    </div>

    <div id="movieModal" class="modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeModal(event)">×</span>
            <img id="modalPoster" class="modal-hero-img">
            
            <div class="modal-body">
                <div class="modal-title-wrap">
                    <h2 id="modalTitle" style="margin: 0; letter-spacing: -0.03em;"></h2>
                    <span id="modalRating" class="modal-rating"></span>
                </div>
                <div id="modalGenre" class="modal-genre"></div>
                <div id="modalMeta" class="meta"></div>
                
                <div id="modalCast" style="font-size: 13px; color: #9ca3af; margin-top: 12px; line-height: 1.4;"></div>
                
                <p id="modalDesc" class="modal-desc"></p>
                <a id="modalImdb" target="_blank" style="background: var(--imdb); color: black; padding: 12px 24px; border-radius: 10px; text-decoration: none; font-weight: 800; font-size: 14px; display: inline-block;">Öppna IMDb</a>
            </div>
        </div>
    </div>

    <script>
        let currentTab = 'today';
        let allMoviesData = []; 

        async function init() {
            try {
                const res = await fetch('movies.json?cb=' + Date.now());
                if (res.ok) allMoviesData = await res.json();
                render();
            } catch (e) { console.error(e); }
        }

        function getDurationText(m) {
            if (m.runtime && m.runtime > 0) {
                const hours = Math.floor(m.runtime / 60);
                const mins = m.runtime % 60;
                return hours > 0 ? `${hours}h ${mins}m` : `${mins}m`;
            }
            if (!m.startTime || !m.endTime) return "";
            const diffMs = m.endTime - m.startTime;
            if (diffMs <= 0) return "";
            const totalMins = Math.floor(diffMs / 60000);
            const hours = Math.floor(totalMins / 60);
            const mins = totalMins % 60;
            return hours > 0 ? `${hours}h ${mins}m` : `${mins}m`;
        }

        function createCardHTML(m) {
            const dateObj = new Date(m.startTime);
            const timeStr = dateObj.toLocaleTimeString('sv-SE', {hour: '2-digit', minute:'2-digit'});
            const dateStr = dateObj.toLocaleDateString('sv-SE', {day: 'numeric', month: 'short'});
            const durationStr = getDurationText(m);
            
            const metaHTML = currentTab === 'today' 
                ? `Idag ${timeStr} • ${durationStr}` 
                : `${dateStr} • ${m.channel} • ${durationStr}`;

            const posterHTML = m.image 
                ? `<img class="poster" src="${m.image}" loading="lazy" onerror="this.parentElement.innerHTML='<span class=\'poster-placeholder\'>⭐</span>'">`
                : `<span class="poster-placeholder">⭐</span>`;

            // Fixad säkerhet: Skyddar mot både apostrofer (') och citationstecken (") i titeln.
            const safeTitle = m.title.replace(/'/g, "\\'").replace(/"/g, '&quot;');

            return `
                <div class="movie-card" onclick="openModalById('${m.startTime}-${safeTitle}')">
                    ${m.imdbRate ? `<div class="imdb-badge">★ ${m.imdbRate}</div>` : ''}
                    <div class="poster-container">${posterHTML}</div>
                    <div class="info">
                        <div class="title">${m.title}</div>
                        <div class="meta">${metaHTML}</div>
                    </div>
                </div>
            `;
        }

        function render() {
            const root = document.getElementById('movie-grid');
            root.innerHTML = "";
            
            // --- HÄR ÄR DEN NYA KODEN FÖR TV-DYGNET (BRYTS KL 05:00) ---
            const now = new Date();
            // Backa klockan 5 timmar för att se vilken "logisk" dag det är
            const logicalDay = new Date(now.getTime() - 5 * 60 * 60 * 1000);
            // Sätt starttiden till 05:00:00 på denna logiska dag
            logicalDay.setHours(5, 0, 0, 0);
            const startOfTodayMs = logicalDay.getTime();
            // -----------------------------------------------------------
            
            let moviesToDisplay = (currentTab === 'today') 
                ? allMoviesData.filter(m => m.startTime >= startOfTodayMs)
                : allMoviesData.filter(m => m.startTime < startOfTodayMs);

            const topMovies = moviesToDisplay.filter(m => parseFloat(m.imdbRate) >= 7.0);
            if (topMovies.length > 0) {
                topMovies.sort((a, b) => parseFloat(b.imdbRate) - parseFloat(a.imdbRate));
                const topSection = document.createElement('div');
                topSection.innerHTML = `
                    <h2 class="section-title">⭐ Bäst på IMDb (7.0+)</h2>
                    <div class="container">${topMovies.map(m => createCardHTML(m)).join('')}</div>
                `;
                root.appendChild(topSection);
            }

            const kanaler = ["SVT1", "SVT2", "TV3", "TV4", "KANAL 5", "TV6", "SJUAN", "TV8", "KANAL 9", "TV10", "KANAL 11", "TV12"];
            kanaler.forEach(ch => {
                const chMovies = moviesToDisplay.filter(m => m.channel === ch);
                if (currentTab === 'history') chMovies.sort((a, b) => b.startTime - a.startTime);
                else chMovies.sort((a, b) => a.startTime - b.startTime);

                const chSection = document.createElement('div');
                chSection.innerHTML = `
                    <h2 class="section-title">📺 ${ch}</h2>
                    <div class="container">${chMovies.length > 0 ? chMovies.map(m => createCardHTML(m)).join('') : '<div class="empty-channel">Inga filmer planerade</div>'}</div>
                `;
                root.appendChild(chSection);
            });
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.innerText.toLowerCase() === (tab === 'today' ? 'idag' : 'arkiv')));
            render();
        }

        function openModalById(idMatch) {
            const [startTime, ...titleParts] = idMatch.split('-');
            const title = titleParts.join('-');
            const m = allMoviesData.find(x => x.startTime.toString() === startTime && x.title === title);
            if(m) openModal(m);
        }

        function openModal(m) {
            document.getElementById('modalTitle').innerText = m.title + (m.year ? ` (${m.year})` : '');
            document.getElementById('modalRating').innerText = m.imdbRate ? `★ ${m.imdbRate}` : '';
            
            let rawGenres = m.originalCategory || 'Film';
            let filteredGenres = rawGenres.split(',')
                .map(g => g.trim())
                .filter(g => {
                    const low = g.toLowerCase();
                    return low !== "movie" && low !== "film" && low !== "spelfilm" && low !== "spelfilmer";
                })
                .join(', ');

            document.getElementById('modalGenre').innerText = filteredGenres || 'Långfilm';
            
            // VÄLJ BACKDROP I FÖRSTA HAND, ANNARS POSTER
            const heroImg = m.backdrop || m.image || '';
            document.getElementById('modalPoster').src = heroImg;
            document.getElementById('modalPoster').style.display = heroImg ? 'block' : 'none';
            
            document.getElementById('modalDesc').innerText = m.desc || 'Ingen beskrivning tillgänglig.';
            
            // BYGG STRÄNG FÖR SKÅDISAR OCH REGISSÖR
            let castHtml = '';
            if (m.director) castHtml += `<strong>Regi:</strong> ${m.director}<br>`;
            if (m.actors) castHtml += `<strong>Skådespelare:</strong> ${m.actors}`;
            document.getElementById('modalCast').innerHTML = castHtml;
            document.getElementById('modalCast').style.display = castHtml ? 'block' : 'none';
            
            const durationStr = getDurationText(m);
            const dateStrModal = new Date(m.startTime).toLocaleString('sv-SE', {weekday: 'long', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'});
            document.getElementById('modalMeta').innerHTML = `${m.channel} • Sändes ${dateStrModal} • ${durationStr}`;
            
            document.getElementById('modalImdb').href = m.imdbUrl || '#';
            document.getElementById('modalImdb').style.display = m.imdbUrl ? 'inline-block' : 'none';
            
            document.getElementById('movieModal').style.display = 'flex';
            document.body.style.overflow = 'hidden'; 
            
            history.pushState({ modalOpen: true }, "");
        }

        function closeModal(event, fromPopState = false) { 
            if (event) event.stopPropagation();
            
            const modal = document.getElementById('movieModal');
            if (modal.style.display === 'flex') {
                modal.style.display = 'none'; 
                document.body.style.overflow = 'auto'; 
                
                if (!fromPopState) {
                    history.back(); 
                }
            }
        }

        window.addEventListener('popstate', () => {
            closeModal(null, true);
        });

        init();
    </script>
</body>
</html>
